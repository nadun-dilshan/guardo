name: Docs

on:
  push:
    branches: [main, dev]
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      # npm prunes other-platform native binaries (@next/swc-linux-*,
      # @napi-rs/simple-git-linux-*) from a lockfile generated on macOS
      # (npm/cli#4828), so `npm ci` can't install them on the Linux runner and
      # `next build` crashes. Drop the lockfile and let npm re-resolve for this
      # platform — the workaround npm itself recommends.
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Build static site
        run: npm run docs:build

      # Only upload the Pages artifact when we're actually going to deploy
      # (push to main or a manual run). PRs and dev pushes just build to validate.
      - name: Upload Pages artifact
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    name: Deploy to GitHub Pages
    # Deploy only from main (push) or a manual run — never on PRs or dev.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
