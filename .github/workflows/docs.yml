name: Docs

on:
  push:
    branches: [main, dev]
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      # NOTE: `npm install` (not `npm ci`) on purpose.
      # npm prunes other-platform native binaries (e.g. @next/swc-linux-x64-gnu,
      # @napi-rs/simple-git-linux-x64-gnu) from the lockfile's packages map when
      # it's generated on a different OS (npm/cli#4828). `npm ci` installs the
      # lockfile verbatim and would miss them, crashing `next build` on Linux;
      # `npm install` re-resolves and fetches the right binaries for the runner.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build static site
        run: npm run docs:build

      # Only upload the Pages artifact when we're actually going to deploy
      # (push to main or a manual run). PRs and dev pushes just build to validate.
      - name: Upload Pages artifact
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    name: Deploy to GitHub Pages
    # Deploy only from main (push) or a manual run — never on PRs or dev.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
